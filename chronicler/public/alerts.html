<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Chronicler • Alerts</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/dashboard.css">
  <style>
    /* ── Filters bar ───────────────────────────────────────── */
    .filters {
      padding:12px 14px; background:#0b0f14; border-bottom:1px solid #1c2434;
      display:flex; gap:10px; flex-wrap:wrap; align-items:center;
    }
    .filters select, .filters input {
      padding:7px 10px; border:1px solid #1c2434; border-radius:6px;
      background:#0f1521; color:#d6e3f3; font-size:13px;
    }
    .filters input { min-width:160px; }
    .filters input:focus, .filters select:focus { outline:none; border-color:#2a5a8c; }

    /* ── Table ─────────────────────────────────────────────── */
    .wrap { padding:14px; }
    .alerts-table { width:100%; border-collapse:collapse; }
    .alerts-table th, .alerts-table td {
      border-bottom:1px solid #1c2434; padding:9px 8px;
      text-align:left; font-size:13px;
    }
    .alerts-table th {
      color:#9aa8bd; font-weight:600; font-size:11px;
      text-transform:uppercase; letter-spacing:.06em;
    }
    .alerts-table tbody tr { cursor:pointer; transition:background .1s; }
    .alerts-table tbody tr:hover { background:#0f1a28; }

    /* severity badges */
    .sev { display:inline-block; padding:2px 7px; border-radius:10px; font-size:11px; font-weight:700; }
    .sev-critical { background:#4a0a0a; color:#ff6b6b; }
    .sev-high     { background:#3a1a0a; color:#ff9a3c; }
    .sev-mid      { background:#1a2a1a; color:#7ecb7e; }
    .sev-low      { background:#1a1a2a; color:#7eb3cb; }

    /* ── Bulk toolbar ──────────────────────────────────────── */
    .bulk-bar {
      display:none; align-items:center; gap:10px;
      padding:8px 12px; background:#0f1a28; border:1px solid #1c2434;
      border-radius:6px; margin-bottom:10px;
    }
    .bulk-bar.visible { display:flex; }
    .bulk-count { font-size:13px; color:#b8c7dc; }
    .col-cb     { width:32px; text-align:center; }

    /* ── Pager ─────────────────────────────────────────────── */
    .pager { margin-top:12px; display:flex; gap:10px; align-items:center; }
    #pageInfo { color:#b8c7dc; font-size:13px; }

    /* ── Buttons ───────────────────────────────────────────── */
    .btn        { padding:6px 12px; background:#1c2434; color:#e9eef5; border:1px solid #2a3550; border-radius:6px; cursor:pointer; font-size:13px; transition:filter .15s; }
    .btn:hover  { filter:brightness(1.15); }
    .btn.small  { padding:4px 9px; font-size:12px; }
    .btn.primary { background:#1a3a5c; border-color:#2a5a8c; color:#c8dff5; }
    .btn.danger  { background:#3a1414; border-color:#5c2020; }

    /* ── Detail Modal ──────────────────────────────────────── */
    .modal.hidden { display:none; }
    .modal { position:fixed; inset:0; z-index:9999; }
    .modal-backdrop { position:absolute; inset:0; background:rgba(0,0,0,0.6); }
    .modal-panel {
      position:relative; max-width:820px; width:93%;
      margin:5vh auto; background:#0f1521;
      border:1px solid #1c2434; border-radius:10px;
      display:flex; flex-direction:column; max-height:90vh;
    }
    .modal-header {
      padding:12px 16px; border-bottom:1px solid #1c2434;
      display:flex; align-items:center; justify-content:space-between;
    }
    .modal-header h3 { margin:0; color:#b8c7dc; font-size:14px; letter-spacing:.04em; text-transform:uppercase; }
    .modal-body   { padding:16px; overflow:auto; flex:1; }
    .modal-footer { padding:10px 14px; border-top:1px solid #1c2434; display:flex; gap:8px; justify-content:flex-end; }

    /* detail layout */
    .kv-grid {
      display:grid; grid-template-columns:repeat(auto-fill, minmax(180px,1fr));
      gap:10px; margin-bottom:14px;
    }
    .kv-item { background:#090d14; border:1px solid #1c2434; border-radius:6px; padding:8px 10px; }
    .kv-label { font-size:10px; color:#4a6a8a; text-transform:uppercase; letter-spacing:.06em; margin-bottom:3px; }
    .kv-val   { font-size:13px; color:#c8dff5; word-break:break-all; }

    .section-title { font-size:11px; color:#9aa8bd; text-transform:uppercase; letter-spacing:.06em; margin:14px 0 8px; }

    /* timeline */
    .timeline { border-left:2px solid #1c2434; padding-left:14px; }
    .tl-item  { margin-bottom:14px; }
    .tl-ts    { font-size:11px; color:#4a6a8a; margin-bottom:3px; }
    .tl-msg   { font-size:13px; color:#dbe7ff; background:#090d14; border:1px solid #1c2434; border-radius:5px; padding:6px 10px; }
    .tl-ip    { font-size:11px; color:#6a8aaa; margin-top:3px; }
    .tl-empty { color:#9aa8bd; font-size:13px; }

    .empty { color:#9aa8bd; padding:16px 0; font-size:13px; text-align:center; }
  </style>
</head>
<body>

  <!-- Top Nav -->
  <nav class="top-nav">
    <a href="/">Dashboard</a>
    <a href="/correlation.html">Correlation Rules</a>
    <a href="/artifacts.html">Artifacts</a>
    <a class="active" href="/alerts.html">Alerts</a>
    <a href="/logs.html">Logs</a>
    <a href="/reports.html">Reports</a>
    <a href="/clients.html">Clients</a>
    <a href="/users.html">Users</a>
    <a href="/settings.html">Settings</a>

    <div class="noti-wrap" style="margin-left:auto">
      <button id="notiBell" class="bell" aria-label="Notifications">
        <span class="bell-icon">🔔</span>
        <span id="notiBadge" class="badge">0</span>
      </button>
      <div id="notiMenu" class="dropdown hidden" role="menu" aria-hidden="true">
        <div class="dropdown-header">Notifications</div>
        <div id="notiList" class="dropdown-list"></div>
      </div>
    </div>
  </nav>

  <!-- Filters -->
  <div class="filters">
    <select id="fSeverity">
      <option value="">All Severities</option>
      <option value="low">Low</option>
      <option value="mid">Mid</option>
      <option value="high">High</option>
      <option value="critical">Critical</option>
    </select>
    <select id="fType">
      <option value="">All Types</option>
      <option value="correlation">Correlation</option>
      <option value="artifact">Artifact</option>
    </select>
    <select id="fActive">
      <option value="">Active + Acked</option>
      <option value="true">Active Only</option>
      <option value="false">Acked Only</option>
    </select>
    <select id="fHours">
      <option value="0">Any Time</option>
      <option value="1">Last 1 hour</option>
      <option value="6">Last 6 hours</option>
      <option value="12">Last 12 hours</option>
      <option value="24">Last 24 hours</option>
      <option value="168">Last 7 days</option>
    </select>
    <input id="fSearch" placeholder="Search IP / keyword">
    <button class="btn primary" id="btnFilter">Apply</button>
  </div>

  <!-- Table -->
  <div class="wrap">
    <!-- Bulk action bar (hidden until rows are selected) -->
    <div class="bulk-bar" id="alertsBulkBar">
      <span class="bulk-count" id="alertsBulkCount">0 selected</span>
      <button class="btn danger small" id="alertsBulkDelete">🗑 Delete Selected</button>
      <button class="btn small" id="alertsBulkAck">✔ Ack Selected</button>
      <button class="btn small" id="alertsBulkClear" style="margin-left:auto;color:#6a8aaa">Clear</button>
    </div>

    <div id="alertsEmpty" class="empty" style="display:none">No alerts match the current filters.</div>
    <table class="alerts-table" id="alertsTable">
      <thead>
        <tr>
          <th class="col-cb"><input type="checkbox" id="alertsSelectAll" title="Select all"></th>
          <th>ID</th><th>Severity</th><th>Type</th><th>Source IP</th>
          <th>Name / Artifact</th><th>Hits</th><th>Last Seen</th><th>Active</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <div class="pager">
      <button class="btn small" id="prevPage">← Prev</button>
      <span id="pageInfo"></span>
      <button class="btn small" id="nextPage">Next →</button>
    </div>
  </div>

  <!-- ═══ Detail Modal ═══ -->
  <div id="alertModal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-backdrop"></div>
    <div class="modal-panel">
      <div class="modal-header">
        <h3 id="alertModalTitle">Alert Details</h3>
        <button id="alertModalClose" class="btn small">✕</button>
      </div>
      <div id="alertModalBody" class="modal-body">
        <div class="empty">Loading…</div>
      </div>
      <div class="modal-footer">
        <button id="alertAckBtn"    class="btn danger small">✔ Acknowledge</button>
        <button id="alertDeleteBtn" class="btn danger small" style="background:#2a0a0a;border-color:#5a1010">🗑 Delete</button>
        <button id="alertModalCancel" class="btn small" style="margin-left:auto">Close</button>
      </div>
    </div>
  </div>

  <script src="/alerts.js"></script>
</body>
</html>
